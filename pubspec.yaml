name: moonraker_viewer
description: Simple Moonraker job viewer with fullscreen camera feed and overlay.
publish_to: 'none'
version: 2.0.0+109

environment:
  sdk: '>=3.3.0 <4.0.0'

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F766E"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
  remove_alpha_ios: false

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.3
  flutter_mjpeg: ^2.0.4
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
